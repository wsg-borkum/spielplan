<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>WSG Borkum Spielplan</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --bg-light: #f1f3f5;
            --card-white: #ffffff;
            --text-dark: #1a1c1e;
            --text-muted: #6c757d;
            --border-ui: #dee2e6;
            
            --color-home: #008450;
            --color-away: #d11210;
            --color-youth: #f59e0b;
            --color-adult: #004a99;
            --color-pdf-bg: #e9ecef;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 750px; margin: 0 auto; }

        /* Seiten-Header */
        .page-title {
            font-size: 1.8rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; margin-bottom: 25px;
            border-left: 10px solid var(--color-adult); padding-left: 15px;
            line-height: 1;
        }

        .filter-nav {
            margin-bottom: 30px;
            background: var(--card-white);
            border: 2px solid var(--text-dark);
        }

        .filter-row { display: flex; border-bottom: 1px solid var(--border-ui); }
        .filter-row:last-child { border-bottom: none; }

        .btn {
            flex: 1; background: var(--card-white); border: none;
            color: var(--text-muted); padding: 14px 5px; font-size: 0.75rem;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            letter-spacing: 0.1em; border-right: 1px solid var(--border-ui);
        }

        .btn:last-child { border-right: none; }
        .btn.active { background: var(--text-dark); color: white; }

        #game-list { display: flex; flex-direction: column; gap: 20px; }

        .date-label {
            font-size: 0.85rem; font-weight: 900; color: var(--text-dark);
            text-transform: uppercase; letter-spacing: 0.15em;
            border-bottom: 3px solid var(--text-dark);
            padding-bottom: 4px; margin: 25px 0 10px 0;
        }

        .game-box {
            background: var(--card-white);
            border: 2px solid var(--text-dark);
            display: flex; flex-direction: column;
            position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
        }

        .side-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; }

        .game-header {
            padding: 15px 15px 5px 28px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }

        .league-text { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

        .badge-group { display: flex; gap: 6px; }

        .badge {
            font-size: 0.75rem; font-weight: 900; 
            padding: 4px 10px; border: 2px solid currentColor;
            text-transform: uppercase;
        }
        
        .badge-y { color: var(--color-youth); }
        .badge-a { color: var(--color-adult); }
        .badge-h { color: var(--color-home); }
        .badge-w { color: var(--color-away); }

        .game-body { padding: 10px 20px 20px 28px; }

        .teams-text {
            font-size: 1.4rem; font-weight: 900; line-height: 1.1;
            letter-spacing: -0.02em; margin-bottom: 15px;
        }

        .info-grid {
            display: grid; grid-template-columns: auto 1fr; gap: 10px 20px;
            font-size: 0.9rem; border-top: 1px solid var(--border-ui);
            padding-top: 15px;
        }

        .info-label { font-weight: 800; text-transform: uppercase; font-size: 0.65rem; color: var(--text-muted); padding-top: 2px; }
        .time-text { font-weight: 900; font-family: monospace; font-size: 1.1rem; color: var(--text-dark); }
        .loc-link { color: var(--text-dark); text-decoration: none; font-weight: 600; line-height: 1.4; display: block;}
        .loc-link:hover { color: var(--color-adult); text-decoration: underline; }

        .pdf-row { 
            margin-top: 15px; border-top: 1px dotted var(--border-ui); 
            padding-top: 12px; display: flex; justify-content: flex-end; 
        }
        .pdf-btn {
            display: inline-block; text-decoration: none; background: var(--color-pdf-bg);
            color: var(--text-dark); padding: 8px 16px; font-size: 0.7rem; 
            font-weight: 800; text-transform: uppercase; border: 1px solid var(--border-ui);
        }

        .footer {
            margin: 60px 0 40px; text-align: center; 
            border-top: 2px solid var(--text-dark); padding-top: 20px;
        }
        .footer a { color: var(--text-dark); text-decoration: none; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

        @media (max-width: 500px) {
            .page-title { font-size: 1.4rem; }
            .teams-text { font-size: 1.2rem; }
            .badge { font-size: 0.65rem; padding: 3px 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="page-title">WSG Borkum<br>Spielplan</h1>

    <div class="filter-nav">
        <div class="filter-row" id="timeF">
            <button class="btn active" data-f="future">Anstehend</button>
            <button class="btn" data-f="past">Vergangen</button>
        </div>
        <div class="filter-row" id="catF">
            <button class="btn active" data-f="all">Alle Teams</button>
            <button class="btn" data-f="adult">Erwachsene</button>
            <button class="btn" data-f="youth">Jugend</button>
        </div>
        <div class="filter-row" id="locF">
            <button class="btn active" data-f="all">Gesamt</button>
            <button class="btn" data-f="home">Heim</button>
            <button class="btn" data-f="away">Auswärts</button>
        </div>
    </div>

    <div id="game-list"></div>

    <footer class="footer">
        <a href="impressum.html">Impressum & Datenschutz</a>
    </footer>
</div>

<script>
    let filters = { time: 'future', cat: 'all', loc: 'all' };
    let allEvents = [];
    let seenEvents = new Set();

    async function load(sub) {
        try {
            const r = await fetch(`https://familieschmidt.biz/borkum/proxy.php?url=` + encodeURIComponent(`https://pinneberg.tischtennislive.de/export/Tischtennis/iCal.aspx?Typ=Verein&ID=864&Runde=${sub}&Hallenplan=False`));
            const t = await r.text();
            const jcal = ICAL.parse(t);
            new ICAL.Component(jcal).getAllSubcomponents('vevent').forEach(v => {
                const e = new ICAL.Event(v);
                let startDate = e.startDate.toJSDate();
                const rawTitle = e.summary;
                const eventKey = `${rawTitle}_${startDate.getTime()}`;
                
                if (!seenEvents.has(eventKey)) {
                    seenEvents.add(eventKey);
                    const uid = v.getFirstPropertyValue('uid') || "";
                    const gameId = uid.split('_').pop();
                    let [teams, league] = rawTitle.split('(');
                    league = league ? league.replace(')', '') : "Spiel";
                    const isY = /Jungen|Mädchen|Schüler|Jugend|J1|J15|J19/i.test(rawTitle);
                    const isH = rawTitle.toLowerCase().trim().startsWith("wsg borkum");
                    
                    allEvents.push({
                        teams: teams.trim(),
                        league: league.trim().replace(')', ''),
                        start: startDate,
                        location: e.location || "Ort unbekannt",
                        isYouth: isY,
                        isHome: isH,
                        ts: startDate.getTime(),
                        gameId: gameId
                    });
                }
            });
            render();
        } catch (err) { console.error(err); }
    }

    function render() {
        const list = document.getElementById('game-list');
        list.innerHTML = '';
        const now = new Date().getTime();

        let filtered = allEvents.filter(ev => {
            if (filters.time === 'future' && ev.ts < now) return false;
            if (filters.time === 'past' && ev.ts > now) return false;
            if (filters.cat === 'adult' && ev.isYouth) return false;
            if (filters.cat === 'youth' && !ev.isYouth) return false;
            if (filters.loc === 'home' && !ev.isHome) return false;
            if (filters.loc === 'away' && ev.isHome) return false;
            return true;
        });

        filtered.sort((a, b) => filters.time === 'past' ? b.ts - a.ts : a.ts - b.ts);

        let lastDate = "";
        filtered.forEach(ev => {
            const dateStr = ev.start.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
            if (dateStr !== lastDate) {
                const day = document.createElement('div');
                day.className = 'date-label';
                day.innerText = dateStr;
                list.appendChild(day);
                lastDate = dateStr;
            }

            const timeStr = ev.start.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}`;
            const pdfUrl = `https://pinneberg.tischtennislive.de/export/default.aspx?SportArt=96&Format=PDF&Area=Spielbericht&SpielID=${ev.gameId}`;

            const card = document.createElement('div');
            card.className = 'game-box';
            card.innerHTML = `
                <div class="side-bar" style="background:${ev.isHome ? 'var(--color-home)' : 'var(--color-away)'}"></div>
                <div class="game-header">
                    <span class="league-text">${ev.league}</span>
                    <div class="badge-group">
                        <span class="badge ${ev.isYouth ? 'badge-y' : 'badge-a'}">${ev.isYouth ? 'Jugend' : 'Erwachsene'}</span>
                        <span class="badge ${ev.isHome ? 'badge-h' : 'badge-w'}">${ev.isHome ? 'Heim' : 'Auswärts'}</span>
                    </div>
                </div>
                <div class="game-body">
                    <div class="teams-text">${ev.teams}</div>
                    <div class="info-grid">
                        <span class="info-label">Termin</span>
                        <span class="time-text">${timeStr} Uhr</span>
                        <span class="info-label">Spielort</span>
                        <a href="${mapsUrl}" target="_blank" class="loc-link">📍 ${ev.location}</a>
                    </div>
                    ${filters.time === 'past' && ev.gameId ? `
                        <div class="pdf-row">
                            <a href="${pdfUrl}" target="_blank" class="pdf-btn">Spielbericht (PDF)</a>
                        </div>
                    ` : ''}
                </div>
            `;
            list.appendChild(card);
        });
    }

    document.querySelectorAll('.btn').forEach(b => {
        b.addEventListener('click', function() {
            this.parentElement.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            filters[this.parentElement.id.replace('F','')] = this.dataset.f;
            render();
        });
    });

    load('1'); load('2');
</script>

</body>
</html>
