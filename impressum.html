<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSG Borkum Spielplan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --bg-light: #f1f3f5;
            --card-white: #ffffff;
            --text-dark: #1a1c1e;
            --text-muted: #6c757d;
            --border-ui: #dee2e6;
            --color-home: #008450;
            --color-away: #d11210;
            --color-youth: #f59e0b;
            --color-adult: #004a99;
            --color-pdf-bg: #f8f9fa;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 700px; margin: 0 auto; }

        .page-title {
            font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
            margin-bottom: 20px; border-left: 8px solid var(--color-adult);
            padding-left: 12px; line-height: 1.1;
        }

        .filter-nav {
            margin-bottom: 20px; background: var(--card-white);
            border: 2px solid var(--text-dark);
        }

        .filter-row { display: flex; border-bottom: 1px solid var(--border-ui); }
        .filter-row:last-child { border-bottom: none; }

        .btn {
            flex: 1; background: var(--card-white); border: none;
            color: var(--text-muted); padding: 10px 5px; font-size: 0.7rem;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            border-right: 1px solid var(--border-ui);
        }
        .btn.active { background: var(--text-dark); color: white; }

        #game-list { display: flex; flex-direction: column; gap: 8px; }

        .date-label {
            font-size: 0.75rem; font-weight: 900; color: var(--text-dark);
            text-transform: uppercase; letter-spacing: 0.1em;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 2px; margin: 15px 0 5px 0;
        }

        .game-box {
            background: var(--card-white);
            border: 1px solid var(--text-dark);
            position: relative;
            padding: 8px 12px 8px 22px; 
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .side-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }

        .teams-text {
            font-size: 1.1rem; font-weight: 900; line-height: 1.1;
        }

        .league-text { 
            font-size: 0.7rem; color: var(--text-muted); 
            font-weight: 700; text-transform: uppercase; 
        }

        /* Zeile 3: Tags, Uhrzeit & PDF Rechts */
        .meta-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 2px; flex-wrap: nowrap;
        }
        
        .meta-left { display: flex; align-items: center; gap: 6px; }

        .badge {
            font-size: 0.55rem; font-weight: 900; padding: 1px 5px; 
            border: 1.5px solid currentColor; text-transform: uppercase;
        }
        .badge-y { color: var(--color-youth); }
        .badge-a { color: var(--color-adult); }
        .badge-h { color: var(--color-home); }
        .badge-w { color: var(--color-away); }

        .time-val { 
            font-weight: 900; font-family: monospace; font-size: 0.85rem;
            margin-left: 4px; color: var(--text-dark);
        }

        .pdf-btn {
            text-decoration: none; background: var(--color-pdf-bg);
            color: var(--text-dark); padding: 2px 6px; font-size: 0.6rem; 
            font-weight: 800; text-transform: uppercase; border: 1px solid var(--border-ui);
            white-space: nowrap;
        }

        /* Zeile 4: Adresse */
        .address-row {
            font-size: 0.75rem; border-top: 1px solid var(--border-ui);
            padding-top: 4px; margin-top: 2px;
        }
        .loc-link { color: var(--text-dark); text-decoration: none; font-weight: 500; display: block; }
        .loc-link:hover { text-decoration: underline; }

        @media (max-width: 500px) {
            .meta-row { flex-wrap: wrap; gap: 8px; }
            .pdf-btn { order: 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="page-title">WSG Borkum<br>Spielplan</h1>

    <div class="filter-nav">
        <div class="filter-row" id="timeF">
            <button class="btn active" data-f="future">Anstehend</button>
            <button class="btn" data-f="past">Vergangen</button>
        </div>
        <div class="filter-row" id="catF">
            <button class="btn active" data-f="all">Alle Teams</button>
            <button class="btn" data-f="adult">Erwachsene</button>
            <button class="btn" data-f="youth">Jugend</button>
        </div>
        <div class="filter-row" id="locF">
            <button class="btn active" data-f="all">Gesamt</button>
            <button class="btn" data-f="home">Heim</button>
            <button class="btn" data-f="away">Auswärts</button>
        </div>
    </div>

    <div id="game-list"></div>

    <footer style="margin: 40px 0; text-align: center; border-top: 1px solid var(--border-ui); padding-top: 15px;">
        <a href="impressum.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">Impressum & Datenschutz</a>
    </footer>
</div>

<script>
    let filters = { time: 'future', cat: 'all', loc: 'all' };
    let allEvents = [];
    let seenEvents = new Set();

    async function load(sub) {
        try {
            const r = await fetch(`https://familieschmidt.biz/borkum/proxy.php?url=` + encodeURIComponent(`https://pinneberg.tischtennislive.de/export/Tischtennis/iCal.aspx?Typ=Verein&ID=864&Runde=${sub}&Hallenplan=False`));
            const t = await r.text();
            const jcal = ICAL.parse(t);
            new ICAL.Component(jcal).getAllSubcomponents('vevent').forEach(v => {
                const e = new ICAL.Event(v);
                let startDate = e.startDate.toJSDate();
                const rawTitle = e.summary;
                const eventKey = `${rawTitle}_${startDate.getTime()}`;
                
                if (!seenEvents.has(eventKey)) {
                    seenEvents.add(eventKey);
                    const uid = v.getFirstPropertyValue('uid') || "";
                    const gameId = uid.split('_').pop();
                    let [teams, league] = rawTitle.split('(');
                    league = league ? league.replace(')', '') : "Spiel";
                    const isY = /Jungen|Mädchen|Schüler|Jugend|J1|J15|J19/i.test(rawTitle);
                    const isH = rawTitle.toLowerCase().trim().startsWith("wsg borkum");
                    
                    allEvents.push({
                        teams: teams.trim(),
                        league: league.trim().replace('),', '').replace(')', ''),
                        start: startDate,
                        location: e.location || "Ort unbekannt",
                        isYouth: isY,
                        isHome: isH,
                        ts: startDate.getTime(),
                        gameId: gameId
                    });
                }
            });
            render();
        } catch (err) { console.error(err); }
    }

    function render() {
        const list = document.getElementById('game-list');
        list.innerHTML = '';
        const now = new Date().getTime();

        let filtered = allEvents.filter(ev => {
            if (filters.time === 'future' && ev.ts < now) return false;
            if (filters.time === 'past' && ev.ts > now) return false;
            if (filters.cat === 'adult' && ev.isYouth) return false;
            if (filters.cat === 'youth' && !ev.isYouth) return false;
            if (filters.loc === 'home' && !ev.isHome) return false;
            if (filters.loc === 'away' && ev.isHome) return false;
            return true;
        });

        filtered.sort((a, b) => filters.time === 'past' ? b.ts - a.ts : a.ts - b.ts);

        let lastDate = "";
        filtered.forEach(ev => {
            const dateStr = ev.start.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
            if (dateStr !== lastDate) {
                const day = document.createElement('div');
                day.className = 'date-label';
                day.innerText = dateStr;
                list.appendChild(day);
                lastDate = dateStr;
            }

            const timeStr = ev.start.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}`;
            const pdfUrl = `https://pinneberg.tischtennislive.de/export/default.aspx?SportArt=96&Format=PDF&Area=Spielbericht&SpielID=${ev.gameId}`;

            const card = document.createElement('div');
            card.className = 'game-box';
            card.innerHTML = `
                <div class="side-bar" style="background:${ev.isHome ? 'var(--color-home)' : 'var(--color-away)'}"></div>
                <div class="teams-text">${ev.teams}</div>
                <div class="league-text">${ev.league}</div>
                <div class="meta-row">
                    <div class="meta-left">
                        <span class="badge ${ev.isYouth ? 'badge-y' : 'badge-a'}">${ev.isYouth ? 'Jugend' : 'Erwachsene'}</span>
                        <span class="badge ${ev.isHome ? 'badge-h' : 'badge-w'}">${ev.isHome ? 'Heim' : 'Auswärts'}</span>
                        <span class="time-val">${timeStr} Uhr</span>
                    </div>
                    ${filters.time === 'past' && ev.gameId ? `<a href="${pdfUrl}" target="_blank" class="pdf-btn">Spielbericht (PDF)</a>` : ''}
                </div>
                <div class="address-row">
                    <a href="${mapsUrl}" target="_blank" class="loc-link">📍 ${ev.location}</a>
                </div>
            `;
            list.appendChild(card);
        });
    }

    document.querySelectorAll('.btn').forEach(b => {
        b.addEventListener('click', function() {
            this.parentElement.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            filters[this.parentElement.id.replace('F','')] = this.dataset.f;
            render();
        });
    });

    load('1'); load('2');
</script>

</body>
</html>
